<!DOCTYPE html>
<html>
<head>
  <title>Orders</title>
</head>
<body>
  <h1>My Orders</h1>
  <ul id="orderItems"></ul>

  <script>
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    let list = document.getElementById("orderItems");

    if(cart.length === 0){
      list.innerHTML = "<li>No orders yet.</li>";
    } else {
      cart.forEach(item => {
        let li = document.createElement("li");
        li.innerHTML = `<strong>${item.name}</strong> - ₹${item.price} <br>Description: Amazon-style product description here.`;
        list.appendChild(li);
      });
    }
  </script>
</body>
</html>
